<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="stylesheet" href="https://use.typekit.net/omc5fdx.css">

<style>
@page { size: Letter; margin: 0; }

html, body{
  margin:0;
  height:100%;
  background:#fff;
}

body{
  min-height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  text-align:center;
  padding:72px 48px 44px;
}

.top{
  width:100%;
  max-width:760px;
}

h1{
  font-family:"adobe-caslon-pro", serif;
  font-weight:400;
  font-size:32px;
  line-height:1.12;
  margin:0 0 14px 0;
  letter-spacing:0.01em;
}

.subhead{
  font-family:"adobe-caslon-pro", serif;
  font-weight:400;
  font-size:20px;
  margin:0 0 14px 0;
  font-variant-caps: all-small-caps;
  letter-spacing:0.06em;
}

.pubdate{
  font-family:Arial, sans-serif;
  font-size:14px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  opacity:.85;
  margin-bottom:10px;
}

.url{
  font-family:Arial, sans-serif;
  font-size:12px;
  opacity:.6;
  word-break:break-all;
}

.bottom{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

.rule{
  width:min(520px, 85%);
  height:1px;
  background:#000;
  opacity:.18;
}

.logo img{
  width:min(320px, 72%);
  height:auto;
  display:block;
}
</style>
</head>

<body>

<div class="top">
  <h1 id="title">Loading…</h1>
  <div class="subhead" id="subhead"></div>
  <div class="pubdate" id="meta"></div>
  <div class="url" id="url"></div>
</div>

<div class="bottom">
  <div class="rule"></div>
  <div class="logo">
    <img src="https://sharepro.cloud/cfr/CFR_logo_wide.jpg" alt="CFR Logo">
  </div>
</div>

<script>
const p=new URLSearchParams(location.search);

document.getElementById("title").textContent = p.get("title") || "Untitled";
document.getElementById("subhead").textContent = p.get("subhead") || "";

document.getElementById("meta").textContent = new Date().toLocaleString();

document.getElementById("url").textContent = p.get("url") || "";
</script>

</body>
</html>
